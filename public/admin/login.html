<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SriKrishna Real Estate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { dark: '#1a1a2e', ink: '#0f172a', gold: '#C9A96E' } },
                    fontFamily: { sans: ['Inter','sans-serif'], display: ['"Playfair Display"','serif'] }
                }
            }
        }
    </script>
</head>
<body class="antialiased font-sans bg-brand-ink min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white rounded-lg shadow-2xl p-10">
        <a href="../home.html" class="font-display text-2xl font-bold tracking-tight text-brand-dark block mb-2">SRIKRISHNA</a>
        <p class="text-gray-500 text-sm mb-8">Admin sign in</p>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input required name="username" type="text" autocomplete="username" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-brand-gold" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input required name="password" type="password" autocomplete="current-password" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-brand-gold" />
            </div>
            <button type="submit" class="w-full bg-brand-gold text-white py-3 rounded-lg font-bold hover:bg-brand-dark transition-colors">Sign In</button>
            <p id="login-error" class="text-red-500 text-sm hidden"></p>
        </form>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('login-error');
            errorEl.classList.add('hidden');
            const formData = new FormData(e.target);
            try {
                const res = await apiFetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: formData.get('username'),
                        password: formData.get('password'),
                    }),
                });
                setAdminToken(res.token);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorEl.textContent = err.message || 'Login failed';
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
